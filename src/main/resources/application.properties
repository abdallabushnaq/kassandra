spring.profiles.default=h2
#enable=h2 console available at http://localhost:8080/h2-console
#JDBC=URL: jdbc:h2:testdb
#User=Name: sa
#Password=password
server.port=8080
projecthub.api.base-url=http://localhost:8080/api
spring.datasource.url=jdbc:h2:file:./db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
springdoc.api-docs.path=/v3/api-docs
#
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.defaultModelsExpandDepth=-1
springdoc.default-produces-media-type=application/json
#
# VAADIN
#
# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,de.bushnaq.abdalla
vaadin.url-mapping=/ui/*
#
spring.ai.openai.base-url=http://localhost:1234
spring.ai.openai.api-key=lm-studio
spring.ai.openai.chat.options.model=ministral-3-8b-reasoning-2512
#
kassandra.lm-studio.api-url=http://localhost:1234
kassandra.lm-studio.api-key=
kassandra.lm-studio.context-length=20480
kassandra.lm-studio.flash-attention=true
kassandra.lm-studio.offload-kv-cache-to-gpu=true
kassandra.lm-studio.timeout-seconds=300
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.chat.options.max-tokens=${kassandra.lm-studio.context-length}
spring.ai.openai.chat.options.seed=42
#
# Per-service model configuration
# Each AI service can use a different model, loaded/unloaded automatically via LM Studio native API.
#
kassandra.ai.insights-model=qwen/qwen3.5-9b
#one filter test fails
kassandra.ai.filter-model=qwen3.5-4b@q8_0
#kassandra.ai.filter-model=qwen3.5-4b@q4_k_m
kassandra.ai.mcp-model=ministral-3-8b-reasoning-2512
kassandra.ai.temperature=0.0
kassandra.ai.max-tokens=${kassandra.lm-studio.context-length}
kassandra.ai.seed=42
#qwen/qwen3-8b
#
# Application version (resolved by Maven resource filtering at build time)
#
kassandra.version=@project.version@
#
# Kassandra Configuration
#
# Number of months to look ahead when calculating holidays for user locations
kassandra.holidays.look-ahead-months=24
# Initial admin user email (used for first-time setup)
# This email should match an OIDC user's email
kassandra.security.initial-admin-email=admin@kassandra.org
#
# Stable Diffusion Configuration
#
stable-diffusion.api-url=http://localhost:7861
stable-diffusion.timeout-seconds=60
stable-diffusion.default-steps=20
stable-diffusion.default-sampler=DPM++ 2M Karras
stable-diffusion.cfg-scale=7
stable-diffusion.generation-size=512
stable-diffusion.output-size=64
stable-diffusion.avatar-output-size=256
stable-diffusion.model-name=protovisionXLHighFidelity3D_beta0520Bakedvae.safetensors
# 6/10 dreamshaper_8.safetensors
# 6/10 epicphotogasm_lastUnicorn.safetensors
# 5/10 juggernautXL_ragnarokBy.safetensors
# 6/10 photon_v1.safetensors
# 4/10 photonicFusionSDXL_final.safetensors
# 8/10 protovisionXLHighFidelity3D_beta0520Bakedvae.safetensors
# 6/10 realisticVisionV60B1_v51HyperVAE.safetensors
# 7/10 realvisxlV50_v50LightningBakedvae.safetensors
# sd3_medium_incl_clips.safetensors
# 5/10 zavychromaxl_b1.safetensors
# 7/10 zavychromaxl_v100.safetensors
#
# Avatar background colors (used for light/dark avatar generation)
stable-diffusion.avatar-dark-background-color=#333333
# #182739
stable-diffusion.avatar-light-background-color=#FFFFFF
#
# Logging
#
# Uncomment to see the full serialized JSON each tool sends back to the AI agent:
logging.level.de.bushnaq.abdalla.kassandra.ai.mcp.ContextPropagatingToolCallbackProvider=DEBUG
#
#vaadin.react.enable=false
