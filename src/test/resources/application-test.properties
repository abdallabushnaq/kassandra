# Test profile overrides ? only properties that differ from the production application.properties.
# Activated by all test classes via spring.profiles.active=test.
#
server.port=${PORT:8080}
# Clear the production base-url so AbstractApi resolves the random port dynamically via local.server.port
projecthub.api.base-url=
# Use in-memory H2 so tests are isolated and fast
spring.datasource.url=jdbc:h2:mem:testdb
# Drop and recreate schema between test runs for full isolation
spring.jpa.hibernate.ddl-auto=create-drop
# Enable the H2 console during tests for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Do not open a browser window when running tests
vaadin.launch-browser=false
# Disable Vaadin dev-mode tools during tests
vaadin.devmode.devTools.enabled=false
# Disable HTTP Basic auth so tests use mock security only
spring.security.basic.enabled=false
# Stub OAuth2 GitHub client credentials (required by auto-config, not used in tests)
spring.security.oauth2.client.registration.github.client-id=your-github-client-id
spring.security.oauth2.client.registration.github.client-secret=your-github-client-secret
# Exclude OAuth2 redirect URLs from Vaadin's URL handling
vaadin.exclude-urls=/oauth2/**
# Logging overrides for tests
logging.level.root=info
logging.level.io.github.bonigarcia.wdm=warn
logging.level.de.bushnaq=trace
logging.level.de.bushnaq.abdalla.kassandra.report.gantt.GanttUtil=trace
logging.level.org.springframework.web=warn
logging.level.org.springframework.security=warn
debug=false
